aid: aider
name: Aider
description: >-
  Aider is an open-source, terminal-based AI pair programmer that edits code
  directly inside a developer's local Git repository. Written in Python and
  distributed via PyPI under the Apache 2.0 license, Aider is a BYO-LLM tool:
  the user supplies API keys for hosted models (Anthropic Claude, OpenAI,
  DeepSeek, Google Gemini, OpenRouter, Mistral, xAI) or points it at local
  models running through Ollama, LM Studio, or any OpenAI-compatible endpoint.
  Distinguishing capabilities include a repository-wide codebase map that lets
  the model reason about files it has not been shown, multi-file architectural
  edits with diff-based patching, automatic Git commits with conventional
  commit messages, a lint/test/repair loop, image and URL context, voice-to-code,
  and an IDE bridge via `--watch-files` that picks up `AI!` / `AI?` comments
  written from any editor. Aider supports 100+ programming languages via
  tree-sitter, publishes a public LLM coding leaderboard, and has accumulated
  ~45K GitHub stars. There is no hosted SaaS product and no Aider-operated
  REST API — all model inference is delegated to the user's chosen provider,
  and any pricing, rate limits, and FinOps surface live with that provider.
