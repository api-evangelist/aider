    name: Aider CLI
    description: >-
      Open-source terminal AI pair programmer. Federates to user-supplied LLM
      providers (Anthropic, OpenAI, DeepSeek, Google Gemini, OpenRouter,
      Mistral, xAI, or any OpenAI-compatible endpoint including local models
      via Ollama and LM Studio). Includes a repository-wide codebase map,
      multi-file diff-based edits, Git auto-commit, lint/test/repair loop,
      image and URL context, voice-to-code, and an IDE bridge via
      `--watch-files`. Configuration via environment variables, command-line
      flags, or `.aider.conf.yml`.
